<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#F0EDE8"/>

  <!-- Calendar base -->
  <rect x="130" y="80" width="100" height="90" rx="8" fill="none" stroke="#B5A48B" stroke-width="2.5"/>
  <!-- Calendar header -->
  <rect x="130" y="80" width="100" height="26" rx="8" fill="#B5A48B"/>
  <rect x="130" y="94" width="100" height="12" fill="#B5A48B"/>
  <!-- Calendar rings -->
  <line x1="158" y1="74" x2="158" y2="88" stroke="#B5A48B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="202" y1="74" x2="202" y2="88" stroke="#B5A48B" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Calendar grid dots -->
  <circle cx="150" cy="122" r="3" fill="#2D2D2D" opacity="0.35"/>
  <circle cx="165" cy="122" r="3" fill="#2D2D2D" opacity="0.35"/>
  <circle cx="180" cy="122" r="3" fill="#2D2D2D" opacity="0.35"/>
  <circle cx="195" cy="122" r="3" fill="#2D2D2D" opacity="0.35"/>
  <circle cx="210" cy="122" r="3" fill="#2D2D2D" opacity="0.35"/>
  <circle cx="150" cy="138" r="3" fill="#2D2D2D" opacity="0.35"/>
  <circle cx="165" cy="138" r="3" fill="#2D2D2D" opacity="0.35"/>
  <circle cx="180" cy="138" r="4.5" fill="#B5A48B" opacity="0.9"/>
  <circle cx="195" cy="138" r="3" fill="#2D2D2D" opacity="0.35"/>
  <circle cx="210" cy="138" r="3" fill="#2D2D2D" opacity="0.35"/>

  <!-- AI sparkle icon (top-right of calendar) -->
  <g transform="translate(218, 72)">
    <!-- Sparkle star -->
    <path d="M12,0 L14,9 L23,12 L14,15 L12,24 L10,15 L1,12 L10,9 Z" fill="#2D2D2D" opacity="0.65"/>
    <!-- Small sparkles -->
    <path d="M26,4 L27,8 L31,9 L27,10 L26,14 L25,10 L21,9 L25,8 Z" fill="#B5A48B" opacity="0.8"/>
    <circle cx="4" cy="4" r="2" fill="#B5A48B" opacity="0.6"/>
    <circle cx="28" cy="20" r="1.5" fill="#2D2D2D" opacity="0.4"/>
  </g>

  <!-- Arrow down (automation) -->
  <line x1="200" y1="178" x2="200" y2="194" stroke="#B5A48B" stroke-width="2" stroke-linecap="round"/>
  <polyline points="194,190 200,198 206,190" fill="none" stroke="#B5A48B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Result pill -->
  <rect x="148" y="202" width="104" height="32" rx="16" fill="#2D2D2D" opacity="0.85"/>
  <text x="200" y="223" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="0.5" fill="#F9F8F6">評価工数 −50%</text>
</svg>
