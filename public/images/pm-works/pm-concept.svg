<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#EAE8E4"/>

  <!-- Root node -->
  <rect x="162" y="60" width="76" height="34" rx="6" fill="#2D2D2D" opacity="0.82"/>
  <text x="200" y="82" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" fill="#F9F8F6" font-weight="500">PM</text>

  <!-- Connector lines from root -->
  <line x1="200" y1="94" x2="200" y2="108" stroke="#B5A48B" stroke-width="1.8"/>
  <line x1="200" y1="108" x2="122" y2="108" stroke="#B5A48B" stroke-width="1.8"/>
  <line x1="200" y1="108" x2="278" y2="108" stroke="#B5A48B" stroke-width="1.8"/>
  <line x1="122" y1="108" x2="122" y2="120" stroke="#B5A48B" stroke-width="1.8"/>
  <line x1="200" y1="108" x2="200" y2="120" stroke="#B5A48B" stroke-width="1.8"/>
  <line x1="278" y1="108" x2="278" y2="120" stroke="#B5A48B" stroke-width="1.8"/>

  <!-- Level 2 nodes -->
  <rect x="84" y="120" width="76" height="30" rx="5" fill="#B5A48B" opacity="0.85"/>
  <text x="122" y="139" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9.5" fill="#F9F8F6" font-weight="500">要件定義</text>

  <rect x="162" y="120" width="76" height="30" rx="5" fill="#B5A48B" opacity="0.85"/>
  <text x="200" y="139" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9.5" fill="#F9F8F6" font-weight="500">データ移行</text>

  <rect x="240" y="120" width="76" height="30" rx="5" fill="#B5A48B" opacity="0.85"/>
  <text x="278" y="139" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="9.5" fill="#F9F8F6" font-weight="500">ベンダーMGT</text>

  <!-- Connector to level 3 -->
  <line x1="122" y1="150" x2="122" y2="162" stroke="#2D2D2D" stroke-width="1.4" opacity="0.3"/>
  <line x1="200" y1="150" x2="200" y2="162" stroke="#2D2D2D" stroke-width="1.4" opacity="0.3"/>
  <line x1="278" y1="150" x2="278" y2="162" stroke="#2D2D2D" stroke-width="1.4" opacity="0.3"/>

  <!-- Level 3 member dots -->
  <g opacity="0.55">
    <circle cx="100" cy="170" r="7" fill="#2D2D2D"/>
    <circle cx="118" cy="170" r="7" fill="#2D2D2D"/>
    <circle cx="136" cy="170" r="7" fill="#2D2D2D"/>

    <circle cx="178" cy="170" r="7" fill="#2D2D2D"/>
    <circle cx="196" cy="170" r="7" fill="#2D2D2D"/>
    <circle cx="214" cy="170" r="7" fill="#2D2D2D"/>

    <circle cx="256" cy="170" r="7" fill="#2D2D2D"/>
    <circle cx="274" cy="170" r="7" fill="#2D2D2D"/>
    <circle cx="292" cy="170" r="7" fill="#2D2D2D"/>
  </g>

  <!-- Result pill -->
  <rect x="122" y="198" width="156" height="32" rx="16" fill="#2D2D2D" opacity="0.82"/>
  <text x="200" y="219" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="0.3" fill="#F9F8F6">15名以上のチーム統括</text>
</svg>
