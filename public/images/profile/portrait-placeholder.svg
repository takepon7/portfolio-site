<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800" role="img" aria-label="Portrait placeholder">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2F0EB"/>
      <stop offset="1" stop-color="#E7E5DE"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="42%" r="42%">
      <stop offset="0" stop-color="#156B5A" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#156B5A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="figure" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2D2D2D"/>
      <stop offset="1" stop-color="#3A3D3C"/>
    </linearGradient>
  </defs>

  <rect width="600" height="800" fill="url(#paper)"/>

  <!-- subtle dot grid, top-left fade -->
  <g fill="#2D2D2D" opacity="0.05">
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5"/>
    </pattern>
    <rect width="600" height="800" fill="url(#dots)"/>
  </g>

  <!-- accent halo behind figure -->
  <circle cx="300" cy="330" r="250" fill="url(#halo)"/>

  <!-- minimal bust silhouette -->
  <g fill="url(#figure)">
    <rect x="262" y="405" width="76" height="170" rx="34"/>
    <ellipse cx="300" cy="312" rx="108" ry="122"/>
    <path d="M132 800 C132 632 204 545 300 545 C396 545 468 632 468 800 Z"/>
  </g>

  <!-- thin accent baseline -->
  <rect x="132" y="724" width="84" height="3" fill="#156B5A"/>

  <!-- editorial caption -->
  <text x="300" y="762" text-anchor="middle" fill="#565D60"
        font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="20" letter-spacing="6">RYOSUKE TAKEDA</text>
</svg>
